stage4:
  inputs:
    # Stage 2/3 frozen artifact (do not modify its definition).
    news_source_mapped: "data/processed/news_source_mapped.parquet"

  schema_path: "configs/llm/spillover_schema_v2_vllm_compatible.json"
  runtime_config: "configs/llm/runtime_qwen25_32b_awq.yaml"

  sampling:
    # Fixed protocol.
    warmup_start: "2015-09-01"
    warmup_end: "2015-12-31"
    official_start: "2016-01-01"
    official_end: "2016-12-31"

    # Reproducible sampling.
    seed: 7
    batch_size: 4096
    sample_size: 100
    smoke_size: 1

  execution:
    # Runner mode: "mock" for local-only safety; "real" requires vLLM + GPU.
    mode: "mock"
    local_mock_size: 5

    # vLLM OpenAI-compatible endpoint.
    base_url: "http://127.0.0.1:8000"
    api_key: "-"
    timeout_seconds: 120
    # Keep structured_outputs as the default (tests assert this path).
    request_mode: "structured_outputs"  # or "guided_json" / "auto"
    allow_live_minimal_call: false

  outputs:
    official_sample_parquet: "outputs/stage4/official_sample_2016.parquet"
    local_mock_results_parquet: "outputs/stage4/local_mock_results.parquet"
    smoke_results_parquet: "outputs/stage4/smoke_results.parquet"
    formal_results_parquet: "outputs/stage4/formal_results.parquet"
    report_json: "outputs/stage4/stage4_report.json"
    report_markdown: "outputs/stage4/stage4_report.md"

