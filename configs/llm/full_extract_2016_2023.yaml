stage5:
  inputs:
    stage4_report_json: "outputs/stage4/stage4_report.json"
    require_stage4_gate: true
    news_source_mapped: "data/processed/news_source_mapped.parquet"
    alias_seed_csv: "data/raw/mapping/company_alias_seed.csv"

  schema_path: "configs/llm/spillover_schema_v2_vllm_compatible.json"
  runtime_config: "configs/llm/runtime_qwen25_32b_awq.yaml"

  filters:
    start_date: "2015-09-01"
    warmup_end: "2015-12-31"
    evaluation_start: "2016-01-01"
    end_date: "2023-12-31"
    require_mapped_source: true
    require_source_ticker: true

  execution:
    mode: "mock"  # mock / dry_run / real
    seed: 7
    batch_size: 128
    base_url: "http://127.0.0.1:8000"
    api_key: "-"
    timeout_seconds: 120
    request_mode: "structured_outputs"
    allow_live_minimal_call: false

  target_resolution:
    company_alias_min_length: 4
    allow_exact_ticker: true
    drop_self_loops: true

  smoke:
    shard_limit: 1
    batch_limit_per_shard: 1
    row_limit_per_shard: 8

  mock:
    targets:
      - "Apple"
      - "Microsoft"
      - "NVIDIA"
      - "Amazon"
    event_types:
      - "partnership"
      - "other"
      - "product_launch"
    fail_news_ids: []

  cache:
    raw_dir: "data/cache/llm_raw"
    parsed_dir: "data/cache/llm_parsed"
    failure_dir: "outputs/stage5/failure_batches"

  outputs:
    checkpoint_json: "outputs/stage5/stage5_checkpoint.json"
    failures_parquet: "outputs/stage5/stage5_failures.parquet"
    summary_json: "outputs/stage5/stage5_summary.json"
    summary_markdown: "outputs/stage5/stage5_summary.md"
    extractions_parquet: "data/processed/spillover_extractions.parquet"
    edges_parquet: "data/processed/spillover_edges.parquet"
